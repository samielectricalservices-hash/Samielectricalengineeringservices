services:
  postgres:
    image: postgres:16-alpine
    container_name: msms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: msms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - msms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d msms"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  msms_postgres_data:
